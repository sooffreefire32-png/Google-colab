name: Custom Script Render
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y blender ffmpeg libegl1 libgles2
      - name: Run
        run: |
          cat << 'EOF' > custom_logic.py

import bpy
# Yahan apni Blender Python script paste karein...
bpy.ops.wm.read_factory_settings()
bpy.ops.mesh.primitive_monkey_add(location=(0,0,0))
# Camera aur Render settings lazmi check karein

EOF
          blender -b -P custom_logic.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Custom-Render-Output
          path: '*.mp4'
