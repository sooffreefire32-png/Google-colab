name: 3D Pro Movie Pipeline
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Describe your scene'
        default: 'Metallic character in cinematic blue lighting'

jobs:
  render_movie:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Blender & Graphics Drivers
        run: |
          sudo apt-get update
          sudo apt-get install -y blender ffmpeg libegl1 libgles2 libdbus-1-3
      - name: AI Movie Engine
        run: |
          cat << 'EOF' > director.py
          import bpy
          import math

          # Reset scene
          bpy.ops.wm.read_factory_settings()
          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()

          # 1. Environment & Lighting
          bpy.context.scene.world.use_nodes = True
          bg = bpy.context.scene.world.node_tree.nodes['Background']
          bg.inputs[0].default_value = (0.02, 0.02, 0.05, 1)

          bpy.ops.object.light_add(type='AREA', location=(5, -5, 10))
          lamp = bpy.context.object
          lamp.data.energy = 5000
          lamp.data.color = (0.2, 0.5, 1) # Cinematic Teal

          # 2. The Hero Character
          bpy.ops.mesh.primitive_monkey_add(location=(0, 0, 1))
          monkey = bpy.context.object
          mat = bpy.data.materials.new(name="HeroMat")
          mat.use_nodes = True
          nodes = mat.node_tree.nodes
          bsdf = nodes.get("Principled BSDF")
          bsdf.inputs['Base Color'].default_value = (1, 0.8, 0.1, 1) # Gold
          bsdf.inputs['Metallic'].default_value = 1.0
          bsdf.inputs['Roughness'].default_value = 0.2
          monkey.data.materials.append(mat)

          # 3. Cinematic Camera Movement (Panning)
          bpy.ops.object.camera_add(location=(10, -10, 5))
          cam = bpy.context.object
          bpy.context.scene.camera = cam
          
          # Look at constraints
          empty = bpy.data.objects.new("Empty", None)
          bpy.context.collection.objects.link(empty)
          empty.location = (0, 0, 1)
          constr = cam.constraints.new(type='TRACK_TO')
          constr.target = empty

          # Animate Camera
          cam.keyframe_insert(data_path="location", frame=1)
          cam.location = (5, -12, 8)
          cam.keyframe_insert(data_path="location", frame=120)

          # 4. Character Animation
          monkey.rotation_euler[2] = 0
          monkey.keyframe_insert(data_path="rotation_euler", frame=1)
          monkey.rotation_euler[2] = math.radians(360)
          monkey.keyframe_insert(data_path="rotation_euler", frame=120)

          # 5. High-Quality Render Settings
          scene = bpy.context.scene
          scene.render.image_settings.file_format = 'FFMPEG'
          scene.render.ffmpeg.format = 'MPEG4'
          scene.render.ffmpeg.constant_rate_factor = 'HIGH'
          scene.render.filepath = 'final_movie.mp4'
          scene.frame_end = 120
          bpy.ops.render.render(animation=True)
          EOF
          blender -b -P director.py
      - name: Upload Movie
        uses: actions/upload-artifact@v4
        with:
          name: Cinematic-3D-Movie
          path: final_movie.mp4
