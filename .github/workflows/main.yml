name: 3D Animation Engine 1782719794
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render_3d_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Blender & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y blender ffmpeg libegl1 libgles2 libdbus-1-3
      - name: Execute Animation Script
        run: |
          cat << 'EOF' > animate.py
          import bpy
          bpy.ops.wm.read_factory_settings()
          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()
          
          # Add Monkey
          bpy.ops.mesh.primitive_monkey_add(location=(0,0,0))
          monkey = bpy.context.object
          
          # Add Camera
          bpy.ops.object.camera_add(location=(0, -5, 2), rotation=(1.2, 0, 0))
          bpy.context.scene.camera = bpy.context.object
          
          # Add Light
          bpy.ops.object.light_add(type='SUN', location=(5, 5, 10))
          
          # Animate Monkey
          monkey.rotation_euler[2] = 0
          monkey.keyframe_insert(data_path='rotation_euler', frame=1)
          monkey.rotation_euler[2] = 6.28
          monkey.keyframe_insert(data_path='rotation_euler', frame=60)
          
          # Render Settings
          bpy.context.scene.render.image_settings.file_format = 'FFMPEG'
          bpy.context.scene.render.ffmpeg.format = 'MPEG4'
          bpy.context.scene.render.filepath = '${{ github.workspace }}/final_animation.mp4'
          bpy.context.scene.frame_end = 60
          bpy.ops.render.render(animation=True)
          EOF
          blender -b -P animate.py
      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: Final-3D-Video
          path: final_animation.mp4
