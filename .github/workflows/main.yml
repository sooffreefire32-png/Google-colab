name: 3D Animation Pipeline
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build_3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Blender
        run: sudo apt-get update && sudo apt-get install -y blender
      - name: Generate 3D Model
        run: |
          echo "import bpy; bpy.ops.wm.read_factory_settings(); bpy.ops.object.select_all(action='SELECT'); bpy.ops.object.delete(); bpy.ops.mesh.primitive_monkey_add(location=(0,0,0)); bpy.ops.export_scene.gltf(filepath='monkey_animation.glb')" > gen.py
          blender -b -P gen.py
      - name: Commit Results
        run: |
          git config --global user.name 'Pipeline Bot'
          git config --global user.email 'bot@github.com'
          git add monkey_animation.glb
          git commit -m "Add generated 3D model" || echo "No changes"
          git push
