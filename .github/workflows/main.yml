name: 3D AI Director Pipeline
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Story Script'
        required: true

jobs:
  direct_and_render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y blender
      - name: AI Smart Logic
        run: |
          export PROMPT="${{ github.event.inputs.prompt }}"
          cat << 'EOF' > director.py
          import bpy
          import os

          prompt = os.environ.get('PROMPT', '').lower()
          
          # --- AI DECISION LOGIC ---
          # Default settings
          light_color = (1, 1, 1, 1) # White
          cam_pos = (7, -7, 5)
          
          if 'neeli roshni' in prompt or 'blue light' in prompt:
              light_color = (0, 0, 1, 1)
          
          if 'close-up' in prompt or 'khirki' in prompt:
              cam_pos = (3, -3, 2)

          # Setup Scene
          bpy.ops.wm.read_factory_settings()
          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()

          # Create Character
          bpy.ops.mesh.primitive_monkey_add(location=(0,0,1))
          
          # Apply Smart Lighting
          bpy.ops.object.light_add(type='AREA', location=(5, -5, 10))
          bpy.context.object.data.color = light_color[:3]
          bpy.context.object.data.energy = 5000

          # Apply Smart Camera
          bpy.ops.object.camera_add(location=cam_pos, rotation=(1.1, 0, 0.8))
          bpy.context.scene.camera = bpy.context.object

          # Render
          bpy.context.scene.render.image_settings.file_format = 'FFMPEG'
          bpy.context.scene.render.filepath = 'ai_story_video.mp4'
          bpy.ops.render.render(animation=True)
          EOF
          blender -b -P director.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Story-Based-Cartoon
          path: ai_story_video.mp4
