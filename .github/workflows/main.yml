name: 3D AI Director Pipeline
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Fallback Script (if script.txt is missing)'
        default: 'Monkey in a forest'

jobs:
  direct_and_render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y blender
      - name: AI Smart Logic
        run: |
          # Priority: Read from script.txt if it exists
          if [ -f "script.txt" ]; then
            export PROMPT=$(cat script.txt)
            echo "Using script.txt content"
          else
            export PROMPT="${{ github.event.inputs.prompt }}"
            echo "Using manual input prompt"
          fi

          cat << 'EOF' > director.py
          import bpy
          import os
          import math

          prompt = os.environ.get('PROMPT', '').lower()
          
          # --- AI GENERATION LOGIC ---
          bpy.ops.wm.read_factory_settings()
          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()

          # 1. Create Background/Environment
          bpy.ops.mesh.primitive_plane_add(size=20, location=(0, 0, 0))
          floor = bpy.context.object
          floor.name = "Ground"

          # 2. Lighting Analysis
          bpy.ops.object.light_add(type='AREA', location=(5, 5, 10))
          sun = bpy.context.object
          if 'neeli' in prompt or 'blue' in prompt:
              sun.data.color = (0, 0.2, 1)
          elif 'shuh' in prompt or 'red' in prompt:
              sun.data.color = (1, 0, 0)
          
          # 3. Character Creation
          bpy.ops.mesh.primitive_monkey_add(location=(0, 0, 1.5))
          monkey = bpy.context.object

          # 4. Animation (Movement Logic)
          monkey.animation_data_create()
          monkey.animation_data.action = bpy.data.actions.new(name="Idle")
          
          for frame in range(1, 101):
              bpy.context.scene.frame_set(frame)
              # Movement: Floating effect
              monkey.location.z = 1.5 + math.sin(frame * 0.1) * 0.5
              monkey.rotation_euler[2] = frame * 0.05
              monkey.keyframe_insert(data_path="location", index=2)
              monkey.keyframe_insert(data_path="rotation_euler", index=2)

          # 5. Camera Placement
          bpy.ops.object.camera_add(location=(8, -8, 6), rotation=(1.1, 0, 0.78))
          bpy.context.scene.camera = bpy.context.object

          # 6. Render Settings
          bpy.context.scene.render.image_settings.file_format = 'FFMPEG'
          bpy.context.scene.render.ffmpeg.format = 'MPEG4'
          bpy.context.scene.render.filepath = 'ai_story_video.mp4'
          bpy.context.scene.frame_end = 100
          bpy.ops.render.render(animation=True)
          EOF
          blender -b -P director.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Final-AI-Cartoon
          path: ai_story_video.mp4
