name: 3D AI Director Pipeline 1782748891
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Cartoon scene description'
        default: 'A happy monkey jumping in a colorful park'
        required: true

jobs:
  direct_and_render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender ffmpeg libegl1 libgles2 libdbus-1-3
      - name: Render Cartoon
        run: |
          export PROMPT="{{ github.event.inputs.prompt }}"
          cat << 'EOF' > director.py
import bpy, os, math, random
prompt = os.environ.get('PROMPT', '').lower()
bpy.ops.wm.read_factory_settings()
bpy.ops.object.select_all(action='SELECT')
bpy.ops.object.delete()

# World
bpy.context.scene.world.use_nodes = True
bg = bpy.context.scene.world.node_tree.nodes['Background']
bg.inputs[0].default_value = (0.3, 0.5, 1.0, 1) # Blue Sky

# Ground
bpy.ops.mesh.primitive_plane_add(size=20)
floor = bpy.context.object
mat = bpy.data.materials.new(name="Ground")
mat.diffuse_color = (0.2, 0.8, 0.2, 1)
floor.data.materials.append(mat)

# Monkey
bpy.ops.mesh.primitive_monkey_add(location=(0, 0, 1.5))
monkey = bpy.context.object

# Animation
for f in range(1, 121):
    bpy.context.scene.frame_set(f)
    monkey.location.z = 1.5 + abs(math.sin(f * 0.2)) * 2
    monkey.rotation_euler[2] = f * 0.1
    monkey.keyframe_insert(data_path="location")
    monkey.keyframe_insert(data_path="rotation_euler")

# Camera
bpy.ops.object.camera_add(location=(15, -15, 10), rotation=(1.1, 0, 0.8))
bpy.context.scene.camera = bpy.context.object

# Render
bpy.context.scene.render.image_settings.file_format = 'FFMPEG'
bpy.context.scene.render.ffmpeg.format = 'MPEG4'
bpy.context.scene.render.filepath = 'ai_cartoon_video.mp4'
bpy.context.scene.frame_end = 120
bpy.ops.render.render(animation=True)
EOF
          blender -b -P director.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Final-Cartoon
          path: ai_cartoon_video.mp4
