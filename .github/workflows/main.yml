name: 3D Animation Pipeline

on:
  workflow_dispatch:

jobs:
  analyze_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Analyze with GPT-4o
        run: |
          SCRIPT_CONTENT=$(cat script.txt)
          # Build JSON safely to avoid quote errors
          cat <<EOF > payload.json
          {
            "model": "openai/gpt-4o",
            "messages": [{"role": "user", "content": "Analyze this video script and return ONLY a valid JSON object, no markdown, no explanation: $SCRIPT_CONTENT"}]
          }
          EOF
          
          RESPONSE=$(curl -X POST https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -d @payload.json)
          
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > pipeline_data.json
          
      - name: Commit Data
        run: |
          git config --global user.name 'Pipeline Bot'
          git config --global user.email 'bot@github.com'
          git add pipeline_data.json
          git commit -m "Update pipeline data" || echo "No changes to commit"
          git push

  auto_cancel_watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Watchdog
        run: |
          sleep 600
          # Check if colab_pipeline.ipynb was modified or glb files created
          FILES=$(curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/contents/)
          if [[ ! $FILES == *".glb"* ]]; then
            gh run cancel ${{ github.run_id }}
            echo "Colab not started - Cancelled"
          fi
