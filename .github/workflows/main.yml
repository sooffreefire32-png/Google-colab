name: 3D Animation Pipeline
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  analyze_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Analyze
        run: |
          SCRIPT_CONTENT=$(cat script.txt | tr -d '\n' | tr -d '\r')
          echo "{\"model\": \"openai/gpt-4o\", \"messages\": [{\"role\": \"user\", \"content\": \"Analyze this script and return ONLY a JSON object with a key 'models' containing a list of assets: $SCRIPT_CONTENT\"}]}" > payload.json
          RESPONSE=$(curl -X POST https://models.inference.ai.azure.com/chat/completions -H "Content-Type: application/json" -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" -d @payload.json)
          # Robust JSON cleaning
          echo "$RESPONSE" | jq -r '.choices[0].message.content' | sed 's/```json//g' | sed 's/```//g' > pipeline_data.json
      - name: Commit
        run: |
          git config --global user.name 'Pipeline Bot'
          git config --global user.email 'bot@github.com'
          git add pipeline_data.json
          # Commit even if formatting just changed slightly
          git commit -m "Update pipeline data $(date +%Y-%m-%d:%H:%M:%S) [skip ci]" || echo "No changes"
          git push
