name: Render Engine V2
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y blender ffmpeg libegl1 libgles2
      - name: Run
        run: |
          echo "import bpy; bpy.ops.wm.read_factory_settings(); bpy.ops.object.select_all(action='SELECT'); bpy.ops.object.delete(); bpy.ops.mesh.primitive_monkey_add(location=(0,0,1)); bpy.context.scene.frame_start = 1; bpy.context.scene.frame_end = 7200; bpy.context.scene.render.image_settings.file_format = 'FFMPEG'; bpy.context.scene.render.ffmpeg.format = 'MPEG4'; bpy.context.scene.render.filepath = 'final_video.mp4'" > director.py
          blender -b -P director.py -a
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Final-Video
          path: final_video.mp4
